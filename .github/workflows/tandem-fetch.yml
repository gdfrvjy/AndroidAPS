name: Tandem APK Fetch & Deploy
on:
  workflow_dispatch:
    inputs:
      drive_id: { required: true }
      user_email: { required: true }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download Large File from Google Drive (Python Method)
        shell: python
        run: |
          import requests
          import os

          def download_file_from_google_drive(id, destination):
              URL = "https://docs.google.com/uc?export=download&confirm=t"
              session = requests.Session()
              # פנייה ראשונה לקבלת טוקן אישור (עבור קבצים גדולים)
              response = session.get(URL, params={'id': id}, stream=True)
              token = None
              for key, value in response.cookies.items():
                  if key.startswith('download_warning'):
                      token = value
                      break
              
              if token:
                  params = {'id': id, 'confirm': token}
                  response = session.get(URL, params=params, stream=True)
              
              # שמירת הקובץ
              CHUNK_SIZE = 32768
              with open(destination, "wb") as f:
                  for chunk in response.iter_content(CHUNK_SIZE):
                      if chunk: f.write(chunk)

          file_id = "${{ github.event.inputs.drive_id }}"
          dest = "tandem.apk"
          print(f"[*] Downloading file ID: {file_id}")
          download_file_from_google_drive(file_id, dest)
          
          size = os.path.getsize(dest)
          print(f"[V] Download complete. Size: {size} bytes")
          if size < 100000:
              print("❌ Error: Download failed, file too small.")
              exit(1)

      - name: Upload to Contabo S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp tandem.apk s3://$S3_BUCKET/aaps/tandam/tandam.apk --endpoint-url https://eu2.contabostorage.com --acl public-read

      - name: Send Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ עדכון אפליקציית טנדם הצליח"
          body: "שלום, קובץ הטנדם עודכן. לינק: https://object.mk-devices.ovh/loop/aaps/tandam/tandam.apk"
          to: ${{ github.event.inputs.user_email }}
