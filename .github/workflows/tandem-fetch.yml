name: Tandem APK Fetch & Deploy
on:
  workflow_dispatch:
    inputs:
      drive_id: { required: true }
      user_email: { required: true }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install gdown
        run: pip install gdown

      - name: Download from Google Drive
        run: |
          ID="${{ github.event.inputs.drive_id }}"
          python3 -m gdown "$ID" -O tandem.apk
          
          size=$(stat -c%s "tandem.apk")
          echo "Downloaded size: $size bytes"
          if [ $size -lt 1000000 ]; then
            echo "❌ Error: Download failed."
            exit 1
          fi

      - name: Upload to Contabo S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp tandem.apk s3://$S3_BUCKET/aaps/tandam/tandam.apk --endpoint-url https://eu2.contabostorage.com --acl public-read

      - name: Send Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ עדכון אפליקציית טנדם הצליח"
          body: "שלום, קובץ הטנדם עודכן בהצלחה בשרתים.\nלינק להורדה: https://object.mk-devices.ovh/loop/aaps/tandam/tandam.apk"
          to: ${{ github.event.inputs.user_email }}
          from: "AAPS Automation <${{ secrets.MAIL_USERNAME }}>" # כאן התיקון
